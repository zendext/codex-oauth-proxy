name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: codex-oauth-proxy
  DOCKER_IMAGE_NAME: zendext/codex-oauth-proxy

jobs:
  release:
    name: Release linux/amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Collect build metadata
        id: meta
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test -count=1 ./...

      - name: Build linux/amd64 binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -X 'main.Version=${{ steps.meta.outputs.version }}' -X 'main.Commit=${{ steps.meta.outputs.commit }}' -X 'main.BuildDate=${{ steps.meta.outputs.build_date }}'" \
            -o "dist/${BINARY_NAME}-linux-amd64" \
            ./cmd/server
          sha256sum "dist/${BINARY_NAME}-linux-amd64" > "dist/${BINARY_NAME}-linux-amd64.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/codex-oauth-proxy-linux-amd64
            dist/codex-oauth-proxy-linux-amd64.sha256
          fail_on_unmatched_files: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=codex-oauth-proxy
            org.opencontainers.image.description=Local Codex OAuth proxy for Codex CLI traffic

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
